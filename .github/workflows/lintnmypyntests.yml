name: lintnmypyntests

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

  pull_request:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: setting up python env
        id: python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      # Cache the whole venv keyed on the exact python version + pyproject.toml,
      # so the dependent jobs can restore it and skip pip install entirely.
      # The exact (patch) python version must be part of the key: the venv
      # symlinks the interpreter from the runner's tool cache, so a patch bump
      # on the runner image would silently break a stale venv.
      - name: cache venv
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: installing dev dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev,redis]"

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: setting up python env
        id: python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: restore venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
          fail-on-cache-miss: true

      - name: ruff format --check
        run: .venv/bin/ruff format --check .

      - name: ruff check
        run: .venv/bin/ruff check .

  pytest:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: setting up python env
        id: python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: restore venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
          fail-on-cache-miss: true

      - name: static type checking with mypy
        run: .venv/bin/mypy .

      - name: run pytest
        run: .venv/bin/pytest .
