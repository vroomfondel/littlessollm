fail_fast: true

repos:
  # Runs first: with fail_fast a lint/type error must not mask a leaked secret.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: '\.j2$'

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
        types: [ python ]
      - id: ruff-format
        name: ruff format
        entry: ruff format --check .
        language: system
        pass_filenames: false
        types: [ python ]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy .
        language: system
        pass_filenames: false
        types: [ python ]
